<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive - Prison Revival</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="archive">

  <header>
    <a href="index.html" class="logo" data-i18n="siteTitle">Prison Revival</a>
    <div class="lang-selector">
      <select id="lang-select">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="tl">Tagalog</option>
      </select>
    </div>
  </header>

  <main class="container" style="padding: 4rem 2rem;">
    
    <section class="section" style="padding-top: 2rem;">
      <h1 data-i18n="archiveTitle" class="section-title">이전 묵상 자료 아카이브</h1>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; margin-top: 3rem;">
        
        <div class="btn-box" style="border: 1px solid var(--dark-green); background: transparent;">
          <h3 style="color: var(--dark-green); margin-bottom: 1rem; font-family: var(--font-serif);">2026. 03</h3>
          <p style="color: var(--dark-green); opacity: 0.8; margin-bottom: 2rem;">지난 달 묵상 자료</p>
          <a href="#" class="secondary-btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">다운로드</a>
        </div>
        
        <div class="btn-box" style="border: 1px solid var(--dark-green); background: transparent;">
          <h3 style="color: var(--dark-green); margin-bottom: 1rem; font-family: var(--font-serif);">2026. 02</h3>
          <p style="color: var(--dark-green); opacity: 0.8; margin-bottom: 2rem;">지난 달 묵상 자료</p>
          <a href="#" class="secondary-btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">다운로드</a>
        </div>

      </div>

      <div style="margin-top: 5rem; text-align: center;">
        <a href="index.html" class="secondary-btn" data-i18n="backToHome">홈으로 돌아가기</a>
      </div>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 Prison Revival. All rights reserved.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
